; AIS Manager configuration — INI format alternative to ais_config.json

[mqtt]
enabled    = true
broker     = host.docker.internal
port       = 1883
client_id  = ais_manager
keepalive  = 60
qos        = 1
retain     = false

[mqtt.topics]
ais      = uuv/ais
status   = ais/status
gnss_gga = uuv/gnss/gga

[ais]
publish_interval_ms    = 1000
data_timeout_sec       = 5.0
status_interval_sec    = 10
publish_raw_ais        = false
validate_crc           = true
require_position_valid = false

; ── AIS Sensor 1 ──────────────────────────────────────────────────────────────
[ais.device1]
id                     = 1
name                   = ais1
enabled                = true
data_timeout_sec       = 5.0
sync_timeout_sec       = 5.0
send_init_on_reconnect = false
type                   = tcp_client
host                   = host.docker.internal
port                   = 4008
connect_timeout_sec    = 5
reconnect_delay_sec    = 3
read_timeout_ms        = 1000
buffer_size_bytes      = 1024

; Per-device init commands (one per line):
; [ais.device1.init_commands]
; cmd1 = $PMSK,0,0,0,0,0,0,0

; GGA output for AIS1 — sends $GPGGA to ais1's transport when enabled
[ais.device1.gga_output]
enabled          = false
send_interval_ms = 1000
data_timeout_sec = 2.0
; shared_with defaults to device's own name; uses same TCP/serial connection:
shared_with      = ais1

; ── AIS Sensor 2 ──────────────────────────────────────────────────────────────
[ais.device2]
id                     = 2
name                   = ais2
enabled                = true
data_timeout_sec       = 5.0
sync_timeout_sec       = 5.0
send_init_on_reconnect = false
type                   = tcp_client
host                   = host.docker.internal
port                   = 4009
connect_timeout_sec    = 5
reconnect_delay_sec    = 3
read_timeout_ms        = 1000
buffer_size_bytes      = 1024

; GGA output for AIS2 — sends $GPGGA to ais2's transport when enabled
[ais.device2.gga_output]
enabled          = false
send_interval_ms = 1000
data_timeout_sec = 2.0
shared_with      = ais2

; ── Alternative transport examples ────────────────────────────────────────────
; Serial:
; [ais.device2]
; type        = serial
; serial_port = /dev/ttyUSB1
; serial_baud = 38400
;
; UDP (receive only, no GGA output possible):
; [ais.device2]
; type      = udp_server
; bind_host = 0.0.0.0
; bind_port = 4009
