; AIS Manager — INI format (alternative to ais_config.json)

[mqtt]
enabled    = true
broker     = host.docker.internal
port       = 1883
client_id  = ais_manager
keepalive  = 60
qos        = 1
retain     = false

[mqtt.topics]
ais      = uuv/ais
status   = ais/status
gnss_gga = uuv/gnss/gga

[ais]
status_interval_sec = 10

; ── Transport pool ─────────────────────────────────────────────────────────────
; Sections named [ais.transport.<id>] — id matches shared_with in channels.
; Disabling a transport here disables all channels using it; device status is
; still reported.

[ais.transport.ch1]
enabled             = true
type                = tcp_client
host                = host.docker.internal
port                = 4008
connect_timeout_sec = 5
reconnect_delay_sec = 3
read_timeout_ms     = 1000
buffer_size_bytes   = 1024

[ais.transport.ch2]
enabled             = true
type                = tcp_client
host                = host.docker.internal
port                = 4009
connect_timeout_sec = 5
reconnect_delay_sec = 3
read_timeout_ms     = 1000
buffer_size_bytes   = 1024

; Alternative examples:
; [ais.transport.serial1]
; enabled     = true
; type        = serial
; serial_port = /dev/ttyUSB0
; serial_baud = 38400

; [ais.transport.udp1]
; enabled   = true
; type      = udp_server
; bind_host = 0.0.0.0
; bind_port = 4010

; ── AIS Sensor 1 ──────────────────────────────────────────────────────────────
; enabled=false    → skip ALL operations; still listed in ais/status
; publish_enabled  → false keeps transport running but stops MQTT vessel publish

[ais.device1]
id                     = 1
name                   = ais1
enabled                = true
sync_timeout_sec       = 5.0
send_init_on_reconnect = false
publish_enabled        = true
publish_raw_ais        = false
publish_interval_ms    = 1000
validate_checksum      = true

; Per-device init commands (one per line — key name is ignored):
; [ais.device1.init_commands]
; cmd1 = $PMSK,0,0,0,0,0,0,0

; input_channels.aivdm — receive !AIVDM/!AIVDO
[ais.device1.input.aivdm]
enabled          = true
data_timeout_sec = 5.0
shared_with      = ch1

; output_channels.gga — send $GPGGA back to transponder
[ais.device1.output.gga]
enabled          = false
send_interval_ms = 1000
data_timeout_sec = 2.0
shared_with      = ch1

; ── AIS Sensor 2 ──────────────────────────────────────────────────────────────

[ais.device2]
id                     = 2
name                   = ais2
enabled                = true
sync_timeout_sec       = 5.0
send_init_on_reconnect = false
publish_enabled        = true
publish_raw_ais        = false
publish_interval_ms    = 1000
validate_checksum      = true

[ais.device2.input.aivdm]
enabled          = true
data_timeout_sec = 5.0
shared_with      = ch2

[ais.device2.output.gga]
enabled          = false
send_interval_ms = 1000
data_timeout_sec = 2.0
shared_with      = ch2
